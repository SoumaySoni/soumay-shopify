services:
  - type: web
    name: soumay-shopify-api
    env: node
    # Since it's a monorepo, we run from the root directory so it has access to the root package-lock constraints
    rootDir: .
    buildCommand: npm install && npm run build -w @soumay-shopify/server
    startCommand: npm run start -w @soumay-shopify/server
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
